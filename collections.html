<script>

let listItems = [
    {

        "title" : "American<br>photography",

        "img"   : "/images/Mask Group-4.jpg"
    },
    {
        "title" : "Greek antiques",
        "href"  : "#",
        "img"   : "/images/Mask Group-5.jpg"
    },
]
function generateList(data) {
    let item = document.createElement('a');
    item.setAttribute('href',data.href);
    item.classList.add('list_item');

    let img = document.createElement('img');
    img.src = data.img;
        
    let title = document.createElement('h3');
    title.innerHTML = data.title;

    item.append(img);
    item.append(title);
    return item;
}
listItems.forEach(d => {
    collectionsList.append(generateList(d));
});
</script>
